version: 1.0
kind: AgentSchema

required:
  - id
  - name
  - role
  - objective
  - inputs
  - outputs
  - capabilities

properties:
  id:
    type: string
  name:
    type: string
  role:
    type: string
  objective:
    type: string
  inputs:
    type: array
  outputs:
    type: array
  capabilities:
    type: array
  constraints:
    type: array
  tools:
    type: array
  metadata:
    type: object
